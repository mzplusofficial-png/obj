
<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MZ+ Elite System</title>
    <link rel="manifest" href="/manifest.json?v=3">
    <meta name="theme-color" content="#0A0908">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MZ+ Elite">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <script>
      // FIX: UNCAUGHT TYPEERROR: CANNOT SET PROPERTY FETCH OF #<WINDOW> WHICH HAS ONLY A GETTER
      // Ce script s'exécute le plus tôt possible pour s'assurer que 'fetch' peut être surchargé sans erreur.
      (function() {
        try {
          var _f = window.fetch;
          if (_f) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return _f; },
              set: function(v) { 
                console.log('MZ+ System: Fetch override intercepted');
                _f = v; 
              },
              configurable: true,
              enumerable: true
            });
            console.log('MZ+ System: Fetch protection enabled');
          }
        } catch (e) {
          // Si defineProperty échoue, on ne peut rien faire ici.
        }
      })();

      // Capture du prompt PWA le plus tôt possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        console.log('MZ+ System: PWA Prompt buffered');
        // Déclencher un événement personnalisé pour notifier les composants React
        window.dispatchEvent(new CustomEvent('mz-pwa-prompt-ready'));
      });
    </script>
</head>
  <body class="bg-[#0A0908] text-[#F0EBE0] font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
